<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2C5F9E"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8D4F0"/>
      <stop offset="100%" stop-color="#7AADDE"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="24" y="44" width="80" height="56" rx="8" ry="8" fill="#1A3A5C" stroke="#B8D4F0" stroke-width="2"/>
  <!-- Flash/viewfinder bump -->
  <rect x="48" y="34" width="32" height="16" rx="4" ry="4" fill="#1A3A5C" stroke="#B8D4F0" stroke-width="2"/>
  <!-- Lens outer ring -->
  <circle cx="64" cy="72" r="22" fill="none" stroke="#B8D4F0" stroke-width="3"/>
  <!-- Lens inner -->
  <circle cx="64" cy="72" r="15" fill="url(#lens)" opacity="0.8"/>
  <!-- Lens highlight -->
  <circle cx="58" cy="66" r="5" fill="white" opacity="0.4"/>
  <!-- Crosshair lines -->
  <line x1="64" y1="52" x2="64" y2="92" stroke="#FF6B35" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="72" x2="84" y2="72" stroke="#FF6B35" stroke-width="1.5" opacity="0.7"/>
  <!-- Small recording dot -->
  <circle cx="96" cy="48" r="6" fill="#FF4444"/>
</svg>
